<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <title>Admin - Receipt Manager</title>
    <link rel="stylesheet" href="/CSS/about.css">
    <style>
        .admin-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding: 20px; }
        .receipt-card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); text-align: center; }
        .receipt-card img { width: 100%; height: 200px; object-fit: cover; border-radius: 5px; cursor: pointer; }
        .btn-group { margin-top: 15px; display: flex; gap: 10px; justify-content: center; }
        .approve { background: #28a745; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .reject { background: #dc3545; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body style="background: #f0f2f5;">
    <header class="main-header">
        <div class="logo">Admin Dashboard</div>
        <a href="about-app.html" style="color: white; text-decoration: none;">ወደ ዋናው ገጽ ተመለስ</a>
    </header>

    <div class="container">
        <h2>የደረሱ የክፍያ ደረሰኞች</h2>
        <div id="receiptsContainer" class="admin-grid">
            </div>
    </div>

    <script>
    async function loadReceipts() {
    try {
        const response = await fetch('/admin/receipts');
        const receipts = await response.json();
        const container = document.getElementById('receiptsContainer');
        
        if (receipts.length === 0) {
            container.innerHTML = '<p style="text-align:center; width:100%;">እስካሁን ምንም የደረሰኝ ምስል አልተላከም!</p>';
            return;
        }

        container.innerHTML = ''; // የቆየውን ማጽዳት
        receipts.forEach(file => {
            const card = `
                <div class="receipt-card">
                    <img src="${file.url}" alt="Receipt" onclick="window.open('${file.url}')">
                    <p style="font-size: 12px; color: #666; margin-top: 10px;">ፋይል፡ ${file.name}</p>
                    <div class="btn-group">
                        <button class="approve" onclick="action('${file.name}', 'approve')">አጽድቅ</button>
                        <button class="reject" onclick="action('${file.name}', 'reject')">ሰርዝ</button>
                    </div>
                </div>
            `;
            container.innerHTML += card;
        });
    } catch (error) {
        console.error("Error loading receipts:", error);
    }
}
    </script>
</body>
</html>
