<!DOCTYPE html>
<html lang="am">

<head>
    <meta charset="UTF-8">
    <title>Admin - Receipt Manager</title>
    <link rel="stylesheet" href="/CSS/about.css">
    <link rel="icon" href="data:;base64,iVBORw0KGgoAAAAN some-random-text">
    <!-- <link rel="icon" type="image/png" href="/images/logo.png"> -->
    <style>
        .admin-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .receipt-card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .receipt-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn-group {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .approve {
            background: #28a745;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        .reject {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body style="background: #f0f2f5;">
    <header class="main-header">
        <div class="logo">Admin Dashboard</div>
        <a href="about-app.html" style="color: white; text-decoration: none;">Go to HOME</a>
    </header>

    <div class="container">
        <h2>የደረሱ የክፍያ ደረሰኞች</h2>
        <div id="receiptsContainer" class="admin-grid">
        </div>
    </div>


    <script src="/socket.io/socket.io.js"></script>
    <script>
        async function loadReceipts() {
            const container = document.getElementById('receiptsContainer');
            try {
                const response = await fetch('/admin/receipts');
                const receipts = await response.json();

                if (receipts.length === 0) {
                    container.innerHTML = "<p>እስካሁን ምንም የተላከ የደረሰኝ ምስል የለም።</p>";
                    return;
                }

                container.innerHTML = "";
              // loadReceipts ፋንክሽን ውስጥ
                    receipts.forEach(receipt => {
                        const card = `
                            <div class="receipt-card">
                                <img src="${receipt.url}">
                                <p><strong>ተጠቃሚ:</strong> ${receipt.username}</p> <p><strong>አገልግሎት:</strong> ${receipt.serviceName}</p> <button onclick="approvePayment('${receipt.name}', '${receipt.username}', '${receipt.serviceName}')">አጽድቅ</button>
                            </div>
                        `;
                        container.innerHTML += card;
                    });
            } catch (error) {
                console.error("ምስሎችን መጫን አልተቻለም:", error);
            }
        }

        // ዋናው የማጽደቂያ ፋንክሽን
        async function approvePayment(id, username, serviceName) {
            console.log("የሚጸድቀው አገልግሎት፦", serviceName);

            try {
                const response = await fetch('/admin/approve-payment', { // Path በትክክል መሆኑን አረጋግጥ
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id, username, serviceName: serviceName })
                });

                const result = await response.json();
                if (result.success) {
                    alert("ክፍያው ጸድቋል!");
                    location.reload();
                } else {
                    alert("ስህተት፦ " + (result.message || "ክፍያውን ማጽደቅ አልተቻለም"));
                }
            } catch (error) {
                console.error("Error approving payment:", error);
            }
        }

        window.onload = loadReceipts;
    </script>
</body>

</html>
