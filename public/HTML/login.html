<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - HydroOS Site</title>
    <link rel="stylesheet" href="CSS/login.css">
</head>
<body>
<header class="header">
    <nav class="gap-2">
        <div class="logo">HydroOS</div>
        <ul class="nav-links">
            <li><a href="about-app.html">Home</a></li>
            <li><button onclick="goToAdmin()" class="admin-nav-btn">Admin</button></li>
            <li><button onclick="logout()" class="logout-btn">Logout</button></li>
        </ul>
    </nav>
</header>
<div class="form">
    <div class="between">
        <img src="/images/mollaspacial2.png" class="headerimg1" alt="">
    </div>
    <h2>Login</h2>

    <input type="email" id="loginEmail" placeholder="Email" required>
    <input type="password" id="loginPassword" placeholder="Password" required>

    <button onclick="login()">Login</button><br><br>

    <p><a href="forget.html" class="forget-passward">Forgot Password?</a></p>

    <hr>
    <h3>Login with</h3>
    <button class="social google">Google</button>
    <button class="social facebook">Facebook</button>

    <p>No account? <a href="register.html">Register</a></p>
</div>

<script src="JS/general.js"></script>
</body>
</html>
