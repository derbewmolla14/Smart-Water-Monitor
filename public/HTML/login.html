<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Tutorial Site</title>
    <link rel="stylesheet" href="/public/CSS/login.css">
</head>
<body>

<div class="form">
    <div class="between">
        <img src="/public/images/mollaspacial1.png" class="headerimg1" alt="Logo">
    </div>
    <h2>Login</h2>

    <input type="email" id="loginEmail" placeholder="Email" required>
    <input type="password" id="loginPassword" placeholder="Password" required>

    <button onclick="login()">Login</button><br><br>

    <p><a href="forget.html" class="forget-passward">Forgot Password?</a></p>

    <hr>
    <h3>Login with</h3>
    <button class="social google">Google</button>
    <button class="social facebook">Facebook</button>

    <p>No account? <a href="register.html">Register</a></p>
</div>

<script src="/public/JS/general.js"></script>
</body>
</html>
